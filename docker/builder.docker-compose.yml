services:
  builder-api:
    build:
      context: ..
      dockerfile: apps/builder-api/Dockerfile
    ports:
      - "${BUILDER_API_PORT:-3001}:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - builder-data:/app/apps/builder-api/data
      - ../template:/app/template:ro
    env_file:
      - ../.env
    environment:
      - PORT=3001
      - DATABASE_PATH=/app/apps/builder-api/data/builder.db
      - TEMPLATE_DIR=/app/template
      - OUTPUT_DIR=/app/apps/builder-api/data/generated
      - APPS_DIR=/app/apps
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  builder-ui:
    build:
      context: ..
      dockerfile: apps/builder-ui/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${BUILDER_UI_PORT:-3000}:80"
    depends_on:
      builder-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  builder-data:
