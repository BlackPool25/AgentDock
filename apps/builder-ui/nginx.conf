server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Direct health check proxy (API exposes /health at root)
    location = /health {
        proxy_pass http://builder-api:3001/health;
        proxy_set_header Host $host;
    }

    # All /api/* routes — keep full path (API routes are prefixed /api/)
    location /api/ {
        proxy_pass http://builder-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
